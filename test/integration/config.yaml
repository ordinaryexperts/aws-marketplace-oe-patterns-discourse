# Integration Test Configuration
# Override values via environment variables: TEST_BASE_URL, TEST_STACK_NAME, etc.

application:
  name: "Discourse"
  health_endpoint: "/srv/status"
  health_expected_response: null  # /srv/status returns 200 with empty body (patched in packer script)
  version_endpoint: "/about.json"
  version_field: "about.version"
  expected_version: "2026.4.0"

aws:
  region: "us-east-1"
  stack_name: "oe-patterns-discourse-dylan"

test:
  timeout: 30
  retry_attempts: 3
  retry_delay: 2

# TEST_BASE_URL environment variable takes precedence
urls:
  base_url: "https://discourse-dylan.dev.patterns.ordinaryexperts.com"

test_user:
  username_prefix: "testuser"
  email_domain: "test.example.com"
  cleanup_after_test: true

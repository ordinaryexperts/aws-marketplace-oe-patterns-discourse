# AWS Marketplace submission configuration
# Used by `make marketplace-validate` / `make marketplace-submit` / `make marketplace-status`
# (via scripts/marketplace.py in the devenv image).

product_id: "prod-xytpfnlptgpg6"

# IAM role that allows AWS Marketplace to read the AMI.
# Use AWSMarketplaceAMIScanning (has the AWS-managed policy attached).
# See aws-marketplace-utilities/UPGRADE.md Known upstream issues #4.
ami_access_role_arn: "arn:aws:iam::879777583535:role/AWSMarketplaceAMIScanning"

# Pattern for the CloudFormation parameter that receives the AMI ID.
# {version} is the pattern version with dots stripped (e.g. "1.2.0" -> "120").
ami_parameter_pattern: "AsgAmiIdv{version}"

# S3 bucket and path prefix where CloudFormation templates are published.
# Bucket lives in oe-patterns-dev (992593896645) — hardcoded in devenv < 2.8.3
# and honored from this config in devenv >= 2.8.3.
template_bucket: "ordinary-experts-aws-marketplace-pattern-artifacts"
template_pattern: "discourse"

# Whether to include a standalone AMI delivery option in addition to the
# CloudFormation delivery option. This product ships as a CloudFormation
# template only.
include_standalone_ami: false

# AMI / OS metadata
operating_system: "UBUNTU"
operating_system_version: "24.04"
username: "ubuntu"
recommended_instance_type: "t3.xlarge"

usage_instructions: >-
  Run the stack, providing valid parameters. When the stack creation completes,
  go to the outputs of the stack and open the URL in your browser. Register an
  account using an email from the AdminEmails parameter to gain admin access.
  To access the application servers, find the EC2 instance in the AWS console
  and Connect using the Session Manager option. For more detailed instructions,
  see the GitHub project.

# CloudFormation delivery option details
delivery_option:
  short_description: |
    Deploy a production-ready Discourse forum on AWS with this CloudFormation template and custom AMI. Provisions VPC, Auto Scaling Group, Aurora PostgreSQL, ElastiCache Redis, EFS, S3, SES, ALB, and Route53.
  long_description: |
    Discourse on AWS by FOSSonCloud deploys a production-ready Discourse forum using AWS best practices.

    WHAT'S DEPLOYED

    - VPC with public and private subnets (or use your existing VPC)
    - Application Load Balancer with ACM certificate for HTTPS
    - Auto Scaling Group with EC2 instances running Discourse (via discourse_docker)
    - Aurora PostgreSQL cluster (multi-AZ)
    - ElastiCache Redis cluster
    - EFS for Discourse shared storage (uploads, backups)
    - S3 bucket for user-uploaded assets
    - SES domain identity with Easy DKIM for email delivery
    - Route53 DNS records
    - CloudWatch Logs integration
    - AWS Secrets Manager for credential storage
    - IAM roles with least-privilege permissions

    REQUIREMENTS

    - Route 53 hosted zone for DNS
    - ACM certificate for HTTPS
    - At least one admin email address for initial account setup
  # Version-pinned; update when bumping TEMPLATE_VERSION.
  # After `make publish-diagram TEMPLATE_VERSION=<v>`, this URL will be valid.
  architecture_diagram_url: "https://ordinary-experts-aws-marketplace-pattern-artifacts.s3.amazonaws.com/discourse/1.4.0/diagram.png"
